<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SplitLink | Secure Pay</title>
    <style>
        :root { --bg: #0D0D0D; --accent: #7C3AED; --glass: rgba(255, 255, 255, 0.03); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { 
            overflow: hidden; touch-action: none; position: fixed; width: 100%; height: 100%; 
            background: var(--bg); color: white; font-family: -apple-system, system-ui, sans-serif; 
            display: flex; align-items: center; justify-content: center; margin: 0; 
        }
        
        /* The signature purple aura from your app */
        .aura { 
            position: absolute; width: 350px; height: 350px; border-radius: 50%; 
            background: var(--accent); filter: blur(120px); opacity: 0.15; 
            top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: -1; 
        }

        /* Removed the ugly outer card, made it a clean container */
        .container { 
            width: 85%; max-width: 340px; text-align: center; z-index: 10;
        }

        /* App-style Header */
        .brand { 
            font-size: 22px; font-weight: 800; margin-bottom: 40px; 
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .brand-dot { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; }
        
        /* Typography */
        .amount { font-size: 64px; font-weight: 800; letter-spacing: -2.5px; margin-bottom: 8px; }
        .payee { opacity: 0.4; font-size: 12px; margin-bottom: 40px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; }
        
        /* App-style Buttons */
        .btn-stack { display: flex; flex-direction: column; gap: 14px; }
        .pay-btn { 
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 18px 20px; 
            border-radius: 20px; /* Matched your Instant Split button radius */
            font-weight: 600; font-size: 16px; 
            cursor: pointer; transition: all 0.2s; 
            display: flex; align-items: center; justify-content: center; 
            color: white; text-decoration: none; position: relative;
        }
        .pay-btn:active { transform: scale(0.97); background: rgba(255, 255, 255, 0.08); }
        
        /* Icons styling - Inverted and brightened to pure white */
        .btn-icon { 
            position: absolute; left: 20px; width: 28px; height: 28px; 
            object-fit: contain; 
            filter: invert(1) grayscale(1) brightness(200); 
        }

        .footer { margin-top: 35px; font-size: 10px; opacity: 0.2; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; }
        .desktop-msg { display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <div id="desktop-msg" class="desktop-msg">
        <h2 style="font-weight: 800;">Mobile Only</h2>
        <p style="opacity: 0.5;">Please open this link on your phone to pay via UPI.</p>
    </div>

    <div id="main-content" class="container">
        <div class="aura"></div>
        
        <div class="brand"><div class="brand-dot"></div>SplitLink</div>
        
        <div id="amt" class="amount">₹0.00</div>
        <div id="name" class="payee">PAYING RECIPIENT</div>
        
        <div class="btn-stack">
            <a href="javascript:void(0)" id="gpay" class="pay-btn">
                <img src="https://i.postimg.cc/fkycNbZ3/icons8-google-pay-96.png" class="btn-icon" alt="GPay">
                <span>Google Pay</span>
            </a>
            <a href="javascript:void(0)" id="phonepe" class="pay-btn">
                <img src="https://i.postimg.cc/23yQD5mZ/icons8-phone-pe-96.png" class="btn-icon" alt="PhonePe">
                <span>PhonePe</span>
            </a>
            <a href="javascript:void(0)" id="paytm" class="pay-btn">
                <img src="https://i.postimg.cc/z3vCrf5h/icons8-paytm-100.png" class="btn-icon" alt="Paytm">
                <span>Paytm</span>
            </a>
        </div>
        
        <div class="footer">SECURE SPLITLINK PROTOCOL</div>
    </div>

    <script>
        (function() {
            // Desktop check
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            if (!isMobile) { 
                document.getElementById('desktop-msg').style.display = 'flex'; 
                document.getElementById('main-content').style.display = 'none'; 
                return; 
            }
            
            // Get raw params (The pure P2P string that works perfectly)
            const urlParams = new URLSearchParams(window.location.search);
            const rawPa = urlParams.get('pa') || "";
            const rawPn = urlParams.get('pn') || "Recipient";
            const rawAm = urlParams.get('am') || "0";

            // Build pure query
            const cleanParams = new URLSearchParams();
            cleanParams.set('pa', rawPa);
            cleanParams.set('pn', rawPn);
            cleanParams.set('am', parseFloat(rawAm).toFixed(2));
            cleanParams.set('cu', 'INR');
            const cleanQuery = cleanParams.toString();

            // Update UI
            document.getElementById('amt').innerText = `₹${parseFloat(rawAm).toFixed(2)}`;
            document.getElementById('name').innerText = `PAYING ${rawPn.toUpperCase()}`;

            // Intents
            const intents = { 
                gpay: `tez://upi/pay?${cleanQuery}`, 
                phonepe: `phonepe://pay?${cleanQuery}`, 
                paytm: `paytmmp://pay?${cleanQuery}` 
            };

            Object.keys(intents).forEach(id => {
                document.getElementById(id).addEventListener('click', (e) => {
                    e.preventDefault();
                    window.location.href = intents[id];
                    setTimeout(() => { window.location.href = `upi://pay?${cleanQuery}`; }, 600);
                });
            });
        })();
    </script>
</body>
</html>
