<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SplitLink | Secure Pay</title>
    <style>
        :root { --bg: #0D0D0D; --accent: #7C3AED; --glass: rgba(255, 255, 255, 0.03); }
        body { background: var(--bg); color: white; font-family: -apple-system, system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .aura { position: absolute; width: 400px; height: 400px; border-radius: 50%; background: var(--accent); filter: blur(120px); opacity: 0.12; z-index: -1; }
        .card { background: var(--glass); backdrop-filter: blur(30px); border: 0.5px solid rgba(255, 255, 255, 0.1); padding: 40px 24px; border-radius: 32px; text-align: center; width: 85%; max-width: 380px; }
        .amount { font-size: 58px; font-weight: 800; letter-spacing: -3px; margin-bottom: 4px; }
        .payee { opacity: 0.4; font-size: 13px; margin-bottom: 35px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; }
        .btn-stack { display: flex; flex-direction: column; gap: 12px; }
        .pay-btn { padding: 18px; border-radius: 18px; font-weight: 700; font-size: 16px; border: none; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; }
        .pay-btn:active { transform: scale(0.97); opacity: 0.8; }
        .gpay { background: #1a73e8; } .phonepe { background: #5f259f; } .paytm { background: #00baf2; }
        .other { background: rgba(255, 255, 255, 0.08); font-size: 13px; }
        .copy-vpa { margin-top: 25px; font-size: 11px; opacity: 0.4; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>
    <div class="aura"></div>
    <div class="card">
        <div id="amt" class="amount">₹0.00</div>
        <div id="name" class="payee">SPLITLINK REQUEST</div>
        <div class="btn-stack">
            <a href="javascript:void(0)" id="gpay" class="pay-btn gpay">Google Pay</a>
            <a href="javascript:void(0)" id="phonepe" class="pay-btn phonepe">PhonePe</a>
            <a href="javascript:void(0)" id="paytm" class="pay-btn paytm">Paytm</a>
            <a href="javascript:void(0)" id="any" class="pay-btn other">Any Other App</a>
        </div>
        <div id="copy" class="copy-vpa">Copy UPI ID if links fail</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const upiQuery = params.toString();
        const vpa = params.get('pa') || "";

        // Update UI
        if(params.has('am')) document.getElementById('amt').innerText = `₹${params.get('am')}`;
        if(params.has('pn')) document.getElementById('name').innerText = `Paying ${decodeURIComponent(params.get('pn'))}`;

        // iOS Intent Mapping (The "Fix")
        // GPay India on iOS specifically uses 'tez://'
        const intents = {
            gpay: `tez://upi/pay?${upiQuery}`,
            phonepe: `phonepe://pay?${upiQuery}`,
            paytm: `paytmmp://pay?${upiQuery}`,
            any: `upi://pay?${upiQuery}`
        };

        Object.keys(intents).forEach(id => {
            document.getElementById(id).addEventListener('click', function(e) {
                // We use a small delay to ensure Safari registers the gesture
                setTimeout(() => {
                    window.location.href = intents[id];
                }, 50);
            });
        });

        document.getElementById('copy').addEventListener('click', () => {
            navigator.clipboard.writeText(vpa);
            alert("UPI ID Copied!");
        });
    </script>
</body>
</html>
