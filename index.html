<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SplitLink | Secure Pay</title>
    <style>
        :root { --bg: #0D0D0D; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--bg); color: white; font-family: -apple-system, system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .aura { position: absolute; width: 400px; height: 400px; border-radius: 50%; background: #7C3AED; filter: blur(120px); opacity: 0.1; z-index: -1; }
        .card { background: var(--glass); backdrop-filter: blur(25px); border: 0.5px solid rgba(255, 255, 255, 0.1); padding: 30px 20px; border-radius: 28px; text-align: center; width: 85%; max-width: 360px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .amount { font-size: 52px; font-weight: 800; letter-spacing: -2px; margin-bottom: 5px; }
        .payee { opacity: 0.5; font-size: 14px; margin-bottom: 30px; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .pay-btn { padding: 16px; border-radius: 16px; font-weight: 700; font-size: 14px; border: none; cursor: pointer; transition: transform 0.1s; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; }
        .pay-btn:active { transform: scale(0.96); }
        
        /* App Branding */
        .gpay { background: #1a73e8; }
        .phonepe { background: #5f259f; }
        .paytm { background: #00baf2; }
        .universal { background: #333; grid-column: span 2; margin-top: 5px; font-size: 12px; opacity: 0.8; }
        
        .footer { margin-top: 25px; font-size: 10px; opacity: 0.3; letter-spacing: 1px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="aura"></div>
    <div class="card">
        <div id="amt" class="amount">₹0.00</div>
        <div id="name" class="payee">Paying...</div>
        
        <div class="btn-grid">
            <a href="#" id="gpay-link" class="pay-btn gpay">GPay</a>
            <a href="#" id="phonepe-link" class="pay-btn phonepe">PhonePe</a>
            <a href="#" id="paytm-link" class="pay-btn paytm">Paytm</a>
            <a href="#" id="any-link" class="pay-btn universal">Other UPI App</a>
        </div>
        
        <div class="footer">Powered by SplitLink Protocol</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const upiData = params.toString();
        
        // Update UI
        if(params.has('am')) document.getElementById('amt').innerText = `₹${params.get('am')}`;
        if(params.has('pn')) document.getElementById('name').innerText = `Paying ${decodeURIComponent(params.get('pn'))}`;

        // Specific Intents for 1-Tap Opening
        const gpayUri = `googlepay://pay?${upiData}`;
        const phonepeUri = `phonepe://pay?${upiData}`;
        const paytmUri = `paytmmp://pay?${upiData}`;
        const universalUri = `upi://pay?${upiData}`;

        document.getElementById('gpay-link').href = gpayUri;
        document.getElementById('phonepe-link').href = phonepeUri;
        document.getElementById('paytm-link').href = paytmUri;
        document.getElementById('any-link').href = universalUri;
    </script>
</body>
</html>
