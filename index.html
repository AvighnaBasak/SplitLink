<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SplitLink | Choose App</title>
    <style>
        body { background-color: #0D0D0D; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 400px; text-align: center; }
        h2 { margin-bottom: 5px; font-weight: 800; }
        p { opacity: 0.6; margin-bottom: 30px; font-size: 14px; }
        .btn { 
            display: flex; align-items: center; justify-content: center;
            width: 100%; padding: 18px; margin-bottom: 12px;
            border-radius: 16px; text-decoration: none; color: white;
            font-weight: 600; font-size: 16px; background: #1A1A1A;
            border: 1px solid rgba(255,255,255,0.1); transition: 0.2s;
        }
        .btn:active { transform: scale(0.98); background: #262626; }
        .gpay { border-left: 4px solid #4285F4; }
        .phonepe { border-left: 4px solid #5f259f; }
        .paytm { border-left: 4px solid #00baf2; }
        .other { border-left: 4px solid #7C3AED; }
    </style>
</head>
<body>
    <div class="container">
        <h2 id="amountDisplay">₹0.00</h2>
        <p id="nameDisplay">Paying to User</p>
        
        <a href="#" id="gpayLink" class="btn gpay">Open Google Pay</a>
        <a href="#" id="phonepeLink" class="btn phonepe">Open PhonePe</a>
        <a href="#" id="paytmLink" class="btn paytm">Open Paytm</a>
        <a href="#" id="defaultLink" class="btn other">Any Other UPI App</a>
    </div>

    <script>
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const rawParams = params.toString();
            
            // Set UI details
            document.getElementById('amountDisplay').innerText = `₹${params.get('am') || '0.00'}`;
            document.getElementById('nameDisplay').innerText = `Paying to ${decodeURIComponent(params.get('pn') || 'User')}`;

            // Specific App Schemes for iOS/Android
            // GPay: googlepay://, PhonePe: phonepe://, Paytm: paytmmp://
            document.getElementById('gpayLink').href = `googlepay://pay?${rawParams}`;
            document.getElementById('phonepeLink').href = `phonepe://pay?${rawParams}`;
            document.getElementById('paytmLink').href = `paytmmp://pay?${rawParams}`;
            document.getElementById('defaultLink').href = `upi://pay?${rawParams}`;
        };
    </script>
</body>
</html>
