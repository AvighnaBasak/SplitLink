<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SplitLink | Secure Pay</title>
    <style>
        :root { --bg: #0D0D0D; --accent: #7C3AED; --glass: rgba(255, 255, 255, 0.03); }
        body { background: var(--bg); color: white; font-family: -apple-system, system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .aura { position: absolute; width: 400px; height: 400px; border-radius: 50%; background: var(--accent); filter: blur(120px); opacity: 0.1; z-index: -1; }
        .card { background: var(--glass); backdrop-filter: blur(30px); border: 0.5px solid rgba(255, 255, 255, 0.1); padding: 40px 24px; border-radius: 32px; text-align: center; width: 85%; max-width: 380px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .amount { font-size: 58px; font-weight: 800; letter-spacing: -3px; margin-bottom: 4px; }
        .payee { opacity: 0.4; font-size: 14px; margin-bottom: 35px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }
        
        .btn-stack { display: flex; flex-direction: column; gap: 12px; }
        .pay-btn { padding: 18px; border-radius: 18px; font-weight: 700; font-size: 16px; border: none; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; }
        .pay-btn:active { transform: scale(0.97); opacity: 0.8; }
        
        /* Premium Branding */
        .gpay { background: #1a73e8; }
        .phonepe { background: #5f259f; }
        .paytm { background: #00baf2; }
        .other { background: rgba(255, 255, 255, 0.08); font-size: 13px; opacity: 0.7; }
        
        .footer { margin-top: 30px; font-size: 10px; opacity: 0.2; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="aura"></div>
    <div class="card">
        <div id="amt" class="amount">₹0.00</div>
        <div id="name" class="payee">Request from SplitLink</div>
        
        <div class="btn-stack">
            <a href="javascript:void(0)" id="gpay" class="pay-btn gpay">Open Google Pay</a>
            <a href="javascript:void(0)" id="phonepe" class="pay-btn phonepe">Open PhonePe</a>
            <a href="javascript:void(0)" id="paytm" class="pay-btn paytm">Open Paytm</a>
            <a href="javascript:void(0)" id="any" class="pay-btn other">Use Other UPI App</a>
        </div>
        
        <div class="footer">Verified SplitLink Protocol</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const upiQuery = params.toString();
        
        // Update UI
        if(params.has('am')) document.getElementById('amt').innerText = `₹${params.get('am')}`;
        if(params.has('pn')) document.getElementById('name').innerText = `Paying ${decodeURIComponent(params.get('pn'))}`;

        // Define Specific App Intents
        const intents = {
            gpay: `googlepay://pay?${upiQuery}`,
            phonepe: `phonepe://pay?${upiQuery}`,
            paytm: `paytmmp://pay?${upiQuery}`,
            any: `upi://pay?${upiQuery}`
        };

        // Fix: Manual Trigger on Click (Prevents Safari "Invalid Address" error)
        Object.keys(intents).forEach(id => {
            document.getElementById(id).addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = intents[id];
            });
        });
    </script>
</body>
</html>
