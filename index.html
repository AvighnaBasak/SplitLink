<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SplitLink | Secure Pay</title>
    <style>
        :root { --bg: #0D0D0D; --accent: #7C3AED; --glass: rgba(255, 255, 255, 0.04); }
        body { background: var(--bg); color: white; font-family: -apple-system, system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        
        /* Matching your App's Aura */
        .aura-top { position: absolute; width: 350px; height: 350px; border-radius: 50%; background: var(--accent); filter: blur(130px); opacity: 0.12; top: -100px; left: -100px; z-index: -1; }
        .aura-bottom { position: absolute; width: 350px; height: 350px; border-radius: 50%; background: #4F46E5; filter: blur(130px); opacity: 0.1; bottom: -100px; right: -100px; z-index: -1; }

        .card { background: var(--glass); backdrop-filter: blur(30px); border: 0.5px solid rgba(255, 255, 255, 0.1); padding: 40px 24px; border-radius: 32px; text-align: center; width: 85%; max-width: 380px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .logo-dot { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; display: inline-block; margin-right: 8px; }
        .brand { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 40px; display: flex; align-items: center; justify-content: center; }
        
        .amount { font-size: 58px; font-weight: 800; letter-spacing: -3px; margin-bottom: 4px; }
        .payee { opacity: 0.5; font-size: 13px; margin-bottom: 35px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; }
        
        .btn-stack { display: flex; flex-direction: column; gap: 14px; }
        .pay-btn { padding: 18px; border-radius: 18px; font-weight: 700; font-size: 16px; border: none; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; }
        .pay-btn:active { transform: scale(0.97); opacity: 0.8; }
        
        .gpay { background: #1a73e8; }
        .phonepe { background: #5f259f; }
        .paytm { background: #00baf2; }
        
        .desktop-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        
        .footer { margin-top: 35px; font-size: 10px; opacity: 0.2; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="desktop-msg" class="desktop-overlay">
        <h2 style="font-weight: 800;">Mobile Only</h2>
        <p style="opacity: 0.5;">SplitLink payments can only be processed on mobile devices with UPI apps installed.</p>
    </div>

    <div class="aura-top"></div>
    <div class="aura-bottom"></div>

    <div class="card" id="main-content">
        <div class="brand"><span class="logo-dot"></span>SplitLink</div>
        <div id="amt" class="amount">₹0.00</div>
        <div id="name" class="payee">PAYMENT REQUEST</div>
        
        <div class="btn-stack">
            <a href="javascript:void(0)" id="gpay" class="pay-btn gpay">Google Pay</a>
            <a href="javascript:void(0)" id="phonepe" class="pay-btn phonepe">PhonePe</a>
            <a href="javascript:void(0)" id="paytm" class="pay-btn paytm">Paytm</a>
        </div>
        
        <div class="footer">Verified SplitLink Protocol</div>
    </div>

    <script>
        (function() {
            // 1. Mobile Check
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            if (!isMobile) {
                document.getElementById('desktop-msg').style.display = 'flex';
                document.getElementById('main-content').style.display = 'none';
                return;
            }

            // 2. Secure Parameter Parsing
            const params = new URLSearchParams(window.location.search);
            const amt = params.get('am') || "0.00";
            const payee = params.get('pn') ? decodeURIComponent(params.get('pn')) : "Recipient";
            const upiQuery = params.toString();

            // 3. UI Sync
            document.getElementById('amt').innerText = `₹${parseFloat(amt).toFixed(2)}`;
            document.getElementById('name').innerText = `PAYING ${payee.toUpperCase()}`;

            // 4. Intent Mapping (Verified iOS/Android Protocols)
            const intents = {
                gpay: `tez://upi/pay?${upiQuery}`,
                phonepe: `phonepe://pay?${upiQuery}`,
                paytm: `paytmmp://pay?${upiQuery}`
            };

            // 5. Secure Execution (User Gesture Required)
            Object.keys(intents).forEach(id => {
                const el = document.getElementById(id);
                el.addEventListener('click', function(e) {
                    e.preventDefault();
                    // Small timeout to satisfy Safari gesture tracking
                    setTimeout(() => {
                        window.location.href = intents[id];
                    }, 50);
                });
            });

            // 6. Security: Clear Console and prevent data leaks
            console.clear();
        })();
    </script>
</body>
</html>
