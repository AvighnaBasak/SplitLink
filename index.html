<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SplitLink | Secure Payment</title>
    <style>
        :root { --accent: #7C3AED; --bg: #0D0D0D; }
        body { background: var(--bg); color: white; font-family: -apple-system, system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .aura { position: absolute; width: 400px; height: 400px; border-radius: 50%; background: var(--accent); filter: blur(120px); opacity: 0.1; z-index: -1; }
        .card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 0.5px solid rgba(255, 255, 255, 0.08); padding: 40px 20px; border-radius: 32px; text-align: center; width: 85%; max-width: 350px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .amount { font-size: 56px; font-weight: 800; letter-spacing: -2px; margin-bottom: 4px; color: #fff; }
        .payee { opacity: 0.5; font-size: 14px; margin-bottom: 32px; font-weight: 500; }
        .pay-btn { background: var(--accent); color: white; text-decoration: none; padding: 20px; border-radius: 20px; display: block; font-weight: 700; font-size: 18px; transition: transform 0.1s; border: none; cursor: pointer; width: 100%; box-sizing: border-box; }
        .pay-btn:active { transform: scale(0.96); opacity: 0.9; }
        .footer-text { margin-top: 24px; font-size: 12px; opacity: 0.3; letter-spacing: 0.5px; }
    </style>
</head>
<body>
    <div class="aura"></div>
    <div class="card">
        <div id="amt" class="amount">₹0.00</div>
        <div id="name" class="payee">Paying...</div>
        
        <button id="cta" class="pay-btn">Open UPI App</button>
        
        <div class="footer-text">SECURE P2P SPLIT via SPLITLINK</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const upiUri = `upi://pay?${params.toString()}`;
        
        // Update UI with SMS data
        if(params.has('am')) document.getElementById('amt').innerText = `₹${params.get('am')}`;
        if(params.has('pn')) document.getElementById('name').innerText = `Paying ${decodeURIComponent(params.get('pn'))}`;

        // The Fix: Binding the redirect to a physical button click
        document.getElementById('cta').addEventListener('click', () => {
            window.location.href = upiUri;
            
            // Fallback: If it doesn't open in 1 sec, try again (helps some Androids)
            setTimeout(() => { window.location.href = upiUri; }, 1000);
        });
    </script>
</body>
</html>
