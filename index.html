<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SplitLink Payment</title>
    <style>
        body {
            background-color: #0D0D0D;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #7C3AED;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn {
            background: #7C3AED;
            color: white;
            padding: 16px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            display: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="loader" id="loader"></div>
    <h2 id="status">Redirecting to UPI App...</h2>
    <p id="details" style="opacity: 0.6; font-size: 14px;"></p>
    <a href="#" id="payBtn" class="btn">Open UPI App Manually</a>

    <script>
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            if (!params.has('pa')) {
                document.getElementById('status').innerText = "Invalid Payment Link";
                document.getElementById('loader').style.display = "none";
                return;
            }

            // Construct the upi:// URI
            const upiUri = `upi://pay?${params.toString()}`;
            
            // Show details to the user
            const amount = params.get('am');
            const name = params.get('pn');
            document.getElementById('details').innerText = `Paying ₹${amount} to ${decodeURIComponent(name)}`;

            // Attempt automatic redirect
            window.location.href = upiUri;

            // Fallback for UI if auto-redirect is blocked
            setTimeout(() => {
                document.getElementById('status').innerText = "Redirecting...";
                document.getElementById('payBtn').style.display = "inline-block";
                document.getElementById('payBtn').href = upiUri;
            }, 1500);
        };
    </script>
</body>
</html>
